<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 轻发光 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 轻阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect x="5" y="5" width="190" height="190" rx="30" ry="30" fill="white" stroke="#ececec"/>

  <!-- 连线 -->
  <g stroke="#8c8c8c" stroke-width="1.1" opacity="0.55">
    <!-- 中心节点 (95,105) -->
    <line x1="95" y1="105" x2="60" y2="45"/>
    <line x1="95" y1="105" x2="150" y2="60"/>
    <line x1="95" y1="105" x2="165" y2="115"/>
    <line x1="95" y1="105" x2="120" y2="170"/>
    <line x1="95" y1="105" x2="55" y2="150"/>
    <line x1="95" y1="105" x2="40" y2="95"/>

    <!-- 桥接边 -->
    <line x1="150" y1="60" x2="165" y2="115"/>
    <line x1="120" y1="170" x2="55" y2="150"/>
    <line x1="60" y1="45" x2="40" y2="95"/>
    <line x1="150" y1="60" x2="120" y2="170"/>
    <line x1="60" y1="45" x2="55" y2="150"/>
  </g>

  <!-- 节点 -->
  <g filter="url(#shadow)">
    <circle cx="60" cy="45" r="6" fill="#ff4d4f" filter="url(#glow)"/>
    <circle cx="150" cy="60" r="6" fill="#faad14" filter="url(#glow)"/>
    <circle cx="165" cy="115" r="6" fill="#52c41a" filter="url(#glow)"/>
    <circle cx="120" cy="170" r="6" fill="#13c2c2" filter="url(#glow)"/>
    <circle cx="55" cy="150" r="6" fill="#1890ff" filter="url(#glow)"/>
    <circle cx="40" cy="95" r="6" fill="#722ed1" filter="url(#glow)"/>
    <circle cx="95" cy="105" r="7" fill="#eb2f96" filter="url(#glow)"/>
  </g>
</svg>
